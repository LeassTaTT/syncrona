name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token (enterprise/supply-chain hardening): the
# workflow only reads the repo. Actions are pinned to commit SHAs below.
permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      # G15: validate on Linux (typical CI/CD consumers) and macOS (developer
      # machines). Windows support is tracked separately (D5 / DX1).
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # G16: supply-chain gate — fail on any high/critical advisory in
      # production dependencies (kept at 0 vulnerabilities as of 2026-06-12).
      - name: Security audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high

      - name: Build all workspaces
        run: npm run build

      - name: Typecheck core + mcp-server
        run: npm run typecheck

      - name: Lint core + mcp-server (zero warnings)
        run: npm run lint

      - name: Test @syncro-now-ai/core
        run: npm run test:core

      - name: Test @syncro-now-ai/mcp-server
        run: npm run test:mcp

      - name: Test shared packages (@syncro-now-ai/jira + credential-store)
        run: npm run test:shared

      - name: Coverage gates (core jest thresholds 85/71/80/85, mcp lines>=70% branches>=70%)
        run: npm run test:coverage:gates

      - name: Quality gates (tool contract, docs drift, release checklist)
        run: npm run quality:all

      - name: Upload core coverage artifact
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-coverage
          path: packages/core/coverage
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: always() && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/core/coverage/lcov.info
          fail_ci_if_error: false

  # G16: secret scanning across the full git history. Test fixtures and example
  # files use placeholder credentials and are allowlisted in .gitleaks.toml.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
