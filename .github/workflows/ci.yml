name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token (enterprise/supply-chain hardening): the
# workflow only reads the repo. Actions are pinned to commit SHAs below.
permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      # G15: validate on Linux (typical CI/CD consumers) and macOS (developer
      # machines). Windows support is tracked separately (D5 / DX1).
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # G16: supply-chain gate — fail on any high/critical advisory in
      # production dependencies (kept at 0 vulnerabilities as of 2026-06-12).
      - name: Security audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high

      - name: Build all workspaces
        run: npm run build

      - name: Typecheck core + mcp-server
        run: npm run typecheck

      - name: Lint core + mcp-server (zero warnings)
        run: npm run lint

      - name: Test @syncro-now-ai/core
        run: npm run test:core

      - name: Test @syncro-now-ai/mcp-server
        run: npm run test:mcp

      - name: Coverage gates (core jest thresholds 70/57/61/70, mcp lines>=70% branches>=70%)
        run: npm run test:coverage:gates

      - name: Quality gates (tool contract, docs drift, release checklist)
        run: npm run quality:all

      - name: Upload core coverage artifact
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: core-coverage
          path: packages/core/coverage
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: always() && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/core/coverage/lcov.info
          fail_ci_if_error: false

  # G16: secret scanning across the full git history. Test fixtures and example
  # files use placeholder credentials and are allowlisted in .gitleaks.toml.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
