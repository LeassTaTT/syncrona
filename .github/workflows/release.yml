name: Release

# Publishes the @syncro-now-ai/* packages to npm with build provenance.
#
# OWNER-GATED: this workflow stays dormant until the owner decisions land
# (IP/provenance clearance, repo public, npm scope ownership + 2FA). To enable:
#   1. Claim the @syncro-now-ai scope on npm and enable 2FA (automation token).
#   2. Add the token as the NPM_TOKEN repository secret.
#   3. Run via "Run workflow" (workflow_dispatch) or push a v* tag.
# Provenance requires `id-token: write` and a public repo (npm attestations).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Full validation gate
        run: npm run check

      - name: Publish to npm with provenance
        run: npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  # D5: auto-update the Homebrew formula from the freshly published npm tarball.
  # DORMANT until the tap repo (LeassTaTT/homebrew-tap) exists and the repo
  # variable HOMEBREW_TAP_READY=true + secret HOMEBREW_TAP_TOKEN are set. Until
  # then it is skipped, exactly like the owner-gated publish above.
  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.HOMEBREW_TAP_READY == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve published version, tarball URL and sha256
        id: meta
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          URL="https://registry.npmjs.org/@syncro-now-ai/core/-/core-${VERSION}.tgz"
          curl -fsSL "$URL" -o core.tgz
          SHA=$(shasum -a 256 core.tgz | cut -d' ' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Render formula from the template
        run: |
          mkdir -p out
          sed -e "s|url \".*\"|url \"${{ steps.meta.outputs.url }}\"|" \
              -e "s|sha256 \".*\"|sha256 \"${{ steps.meta.outputs.sha }}\"|" \
              packaging/homebrew/syncro-now-ai.rb > out/syncro-now-ai.rb

      - name: Commit the formula to the tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/LeassTaTT/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp out/syncro-now-ai.rb tap/Formula/syncro-now-ai.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/syncro-now-ai.rb
          git commit -m "syncro-now-ai ${{ steps.meta.outputs.version }}" || { echo "No formula changes"; exit 0; }
          git push
